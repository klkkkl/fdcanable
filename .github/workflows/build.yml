name: Build Firmware

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arm GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 13.3.Rel1

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version
          arm-none-eabi-objcopy --version

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fdcanable-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/fdcanable.elf
            build/${{ matrix.preset }}/fdcanable.hex
            build/${{ matrix.preset }}/fdcanable.bin
            build/${{ matrix.preset }}/fdcanable.map
          if-no-files-found: error
